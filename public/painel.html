<script>


    let proximaAtualizacao;
    //ESSE
    window.onload = function () {
        qtdLivrosCategoria();
        generoMaiorQtd();
        autoresMaisCaros();

    }


    //ESSE
    function qtdLivrosCategoria() {


        fetch("/livros/grafico").then(function (response) {
            if (response.ok) {
                response.json().then(function (resposta) {
                    console.log(`Dados recebidos: ${JSON.stringify(resposta)}`);
                    resposta.reverse();

                    plotarGrafico(resposta);

                });
            } else {
                console.error('Nenhum dado encontrado ou erro na API');
            }
        })
            .catch(function (error) {
                console.error(`Erro na obtenção dos dados p/ gráfico: ${error.message}`);
            });
    }


    //ESSE
    function plotarGrafico(resposta) {

        console.log('iniciando plotagem do gráfico...');

        // Criando estrutura para plotar gráfico - labels
        let labels = [];

        // Criando estrutura para plotar gráfico - dados
        let dados = {
            labels: labels,
            datasets: [{
                label: 'Quantidade de livros',
                data: [],
                fill: false,
                borderColor: 'rgb(75, 192, 192)',
                backgroundColor: '#32b9cd',
                tension: 0.1
            }]
        };

        console.log('----------------------------------------------')
        console.log('Estes dados foram recebidos pela funcao "obterDadosGrafico" e passados para "plotarGrafico":')
        console.log(resposta)

        // Inserindo valores recebidos em estrutura para plotar o gráfico
        for (i = 0; i < resposta.length; i++) {
            var registro = resposta[i];
            labels.push(registro.categoria);
            dados.datasets[0].data.push(registro.quantidade);
        }

        console.log('----------------------------------------------')
        console.log('O gráfico será plotado com os respectivos valores:')
        console.log('Labels:')
        console.log(labels)
        console.log('Dados:')
        console.log(dados.datasets)
        console.log('----------------------------------------------')

        // Criando estrutura para plotar gráfico - config
        const config = {
            type: 'bar', // Gráfico de barras conforme enunciado
            data: dados,
            options: {
                responsive: true,
                scales: {
                    y: {
                        beginAtZero: true,
                        ticks: {
                            color: '#000000',
                            stepSize: 1
                        }
                    },
                    x: {
                        ticks: {
                            color: '#000000'
                        }
                    }
                },
                plugins: {
                    legend: {
                        labels: {
                            color: '#000000'
                        }
                    }
                }
            }
        }

        // Adicionando gráfico criado em div na tela
        let myChart = new Chart(
            document.getElementById(`myChartCanvas`),
            config
        );


    }

    function generoMaiorQtd() {
        fetch('/livros/kpiGenero').then(function (response) {
            if (response.ok) {
                response.json().then(function (resposta) {
                    var kpi = resposta[0];
                    document.getElementById('genero').innerHTML = `${kpi.genero} ${kpi.quantidade} Livros`;
                });
            }
        });
    }

    function autoresMaisCaros() {
        fetch('/livros/kpiAutor').then(function (response) {
            if (response.ok) {
                response.json().then(function (resposta) {
                    var lista = '';
                    for (var i = 0; i < resposta.length; i++) {
                        lista += `<li style="margin-bottom: 5px;">${i + 1}º ${resposta[i].autor} - R$ ${Number(resposta[i].precoMedio).toFixed(2)}</li>`;
                    }
                    document.getElementById('autor').innerHTML = lista;
                });
            }
        });
    }
</script>
